<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Login - Training System</title>
  <style>
    body { font-family: Arial; max-width: 420px; margin: 60px auto; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 18px; }
    input { width: 100%; padding: 10px; margin: 8px 0; }
    button { width: 100%; padding: 10px; cursor: pointer; }
    .msg { color: #b00020; margin-top: 10px; }
    .hint { color:#555; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>
    <p class="hint">Username: <b>admin</b> | Password: <b>1234</b></p>

    <form method="POST">
      <input id="username" name="username" placeholder="Username" autocomplete="off" />
      <input id="password" name="password" placeholder="Password" type="password" />
      <button id="btn-login" type="submit">Sign in</button>
    </form>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="msg">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
  </div>
</body>
</html>
